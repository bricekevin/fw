# sketch.yaml — arduino-cli build profile for M5Clawd.
#
# Why a profile (Phase 1 finding): the dev Mac's global sketchbook
# (~/Documents/Arduino/libraries) contains a generic Arduino `SD` library that
# declares architectures=* and shadows the ESP32 core's own `SD(esp32)`. Because
# M5Stack.h force-includes <SD.h>, a plain `arduino-cli compile --fqbn ...`
# picks the broken sketchbook SD and fails ("Architecture or board not
# supported"). Building with `--profile m5clawd` resolves libraries only from
# this profile + the platform-bundled set, ignoring the global sketchbook, so
# the correct SD is used. This also pins exact versions for reproducible builds.
#
# Build:   arduino-cli compile --profile m5clawd
# Upload:  arduino-cli upload  --profile m5clawd -p <port>

profiles:
  m5clawd:
    fqbn: esp32:esp32:m5stack-core-esp32
    platforms:
      - platform: esp32:esp32 (1.0.4)
        platform_index_url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
    libraries:
      - M5Stack (0.3.1)
      - ArduinoJson (6.17.3)

default_profile: m5clawd
